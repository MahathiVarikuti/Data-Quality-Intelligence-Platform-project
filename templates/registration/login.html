<!DOCTYPE html>
<html>
<head>
    <title>Login — Data Quality Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root { --accent: #2f6de1; --border: #e2e6ea; --text: #1a1d23; --muted: #6b7280; --radius: 12px; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .wrap { width: 100%; max-width: 420px; }
        .brand { text-align: center; margin-bottom: 28px; }
        .brand-dot { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .brand-dot svg { width: 22px; height: 22px; fill: white; }
        .brand h1 { font-size: 1rem; font-weight: 700; color: var(--text); margin: 0; }
        .brand p { font-size: 0.83rem; color: var(--muted); margin: 4px 0 0; }
        .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .card h2 { font-size: 1.15rem; font-weight: 700; margin: 0 0 22px; }
        .field { margin-bottom: 16px; }
        .field label { font-size: 0.82rem; font-weight: 500; display: block; margin-bottom: 5px; color: var(--text); }
        .field input { width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; background: #fafafa; transition: border-color .15s, box-shadow .15s; }
        .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,109,225,.1); background: white; }
        .field input.is-invalid { border-color: #ef4444; }
        .field-error { font-size: 0.78rem; color: #ef4444; margin-top: 4px; display: none; }
        .field-error.show { display: block; }
        .alert-error { background: #fef2f2; border: 1px solid #fecdd3; color: #be123c; padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; }
        .btn-submit { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 4px; transition: opacity .15s; }
        .btn-submit:hover { opacity: 0.9; }
        .footer-link { text-align: center; font-size: 0.83rem; color: var(--muted); margin-top: 18px; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-dot"><svg viewBox="0 0 24 24"><path d="M3 3h18v2H3V3zm0 4h18v2H3V7zm0 4h12v2H3v-2zm0 4h8v2H3v-2zm0 4h5v2H3v-2z"/></svg></div>
        <h1>Data Quality Platform</h1>
        <p>Sign in to your account</p>
    </div>
    <div class="card">
        <h2>Welcome back</h2>
        {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
        <form method="post" id="login-form" novalidate>
            {% csrf_token %}
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{ request.POST.username }}" placeholder="Enter username" autocomplete="username">
                <div class="field-error" id="err-username">Username is required.</div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password">
                <div class="field-error" id="err-password">Password is required.</div>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
    </div>
    <div class="footer-link">Don't have an account? <a href="{% url 'register' %}">Register</a></div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    let valid = true;
    const u = document.getElementById('username');
    const p = document.getElementById('password');
    const eu = document.getElementById('err-username');
    const ep = document.getElementById('err-password');
    eu.classList.remove('show'); ep.classList.remove('show');
    u.classList.remove('is-invalid'); p.classList.remove('is-invalid');
    if (!u.value.trim()) { u.classList.add('is-invalid'); eu.classList.add('show'); valid = false; }
    if (!p.value) { p.classList.add('is-invalid'); ep.classList.add('show'); valid = false; }
    if (!valid) e.preventDefault();
});
</script>
</body>
</html>
